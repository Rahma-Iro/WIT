<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - CyberSafe</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🔐</span>
                <span class="logo-text">CyberSafe</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="tips.html">Tips</a></li>
                <li><a href="stories.html">Stories</a></li>
                <li><a href="articles.html">Articles</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="password.html" class="active">Password Tool</a></li>
                <li><button class="theme-btn" id="themeBtn">Dark</button></li>
            </ul>
        </div>
    </nav>

    <section class="page-header">
        <h2>Password Generator</h2>
        <p>Create strong, secure passwords instantly</p>
    </section>

    <section class="password-section">
        <div class="password-container">

            <div class="password-display">
                <input type="text" id="passwordOutput" readonly placeholder="Your password will appear here">
                <button class="copy-btn" id="copyBtn">Copy</button>
            </div>

            <div class="strength-indicator">
                <div class="strength-bar" id="strengthBar"></div>
                <p id="strengthText">Strength: Not generated</p>
            </div>

            <div class="password-options">
                <div class="option">
                    <label for="length">Password Length: <span id="lengthValue">16</span></label>
                    <input type="range" id="length" min="8" max="32" value="16">
                </div>

                <div class="option">
                    <label>
                        <input type="checkbox" id="uppercase" checked>
                        Include Uppercase (A-Z)
                    </label>
                </div>

                <div class="option">
                    <label>
                        <input type="checkbox" id="lowercase" checked>
                        Include Lowercase (a-z)
                    </label>
                </div>

                <div class="option">
                    <label>
                        <input type="checkbox" id="numbers" checked>
                        Include Numbers (0-9)
                    </label>
                </div>

                <div class="option">
                    <label>
                        <input type="checkbox" id="symbols" checked>
                        Include Symbols (!@#$%)
                    </label>
                </div>
            </div>

            <button class="btn btn-primary generate-btn" id="generateBtn">Generate Password</button>
        </div>
    </section>
    <button id="themeBtn">Dark</button>

    <footer class="footer">
        <p>&copy; 2024 CyberSafe. Created by Rahma Nasir. All rights reserved.</p>
    </footer>

</body>
</html>
